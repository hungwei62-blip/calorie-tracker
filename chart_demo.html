<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食控制管理系統 - 趨勢圖範例</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f1a;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h2 {
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        /* 深色卡片樣式 */
        .chart-card {
            background: #1e1e38 !important;
            border-radius: 20px !important;
            padding: 20px 20px 5px 20px !important;
            margin: 15px 0 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
            box-sizing: border-box !important;
        }
        
        .chart-header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            margin-bottom: 5px !important;
        }
        
        .chart-value {
            font-size: 28px !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            font-family: sans-serif !important;
        }
        
        .chart-unit {
            font-size: 14px !important;
            color: #a0a0a0 !important;
        }
        
        .chart-emoji {
            font-size: 32px !important;
        }
        
        .chart-subtitle {
            color: #a0a0a0;
            font-size: 12px;
            font-family: sans-serif;
        }
        
        /* 圖表容器 */
        .chart-container {
            background: #1e1e38;
            border-radius: 12px;
            padding: 10px 0;
            margin-top: 0;
        }
        
        .info-text {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📈 每日攝取趨勢</h2>
        
        <!-- 熱量卡片 -->
        <div class="chart-card">
            <div class="chart-header">
                <div>
                    <div class="chart-value">1,850 <span class="chart-unit">kcal</span></div>
                    <div class="chart-subtitle">平均每日熱量</div>
                </div>
                <div class="chart-emoji">🔥</div>
            </div>
            <div class="chart-container">
                <!-- 這是 Plotly 圖表的示意圖 -->
                <svg width="100%" height="180" viewBox="0 0 500 180">
                    <!-- 漸層填充 -->
                    <defs>
                        <linearGradient id="orangeGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" style="stop-color:rgba(255,165,0,0.3)"/>
                            <stop offset="100%" style="stop-color:rgba(255,165,0,0)"/>
                        </linearGradient>
                    </defs>
                    <path d="M0,140 Q50,100 100,110 T200,80 T300,90 T400,60 T500,50 L500,180 L0,180 Z" 
                          fill="url(#orangeGradient)"/>
                    <!-- 折線 -->
                    <path d="M0,140 Q50,100 100,110 T200,80 T300,90 T400,60 T500,50" 
                          fill="none" stroke="#FFA500" stroke-width="3"/>
                    <!-- 資料點 -->
                    <circle cx="0" cy="140" r="5" fill="#FFA500"/>
                    <circle cx="100" cy="110" r="5" fill="#FFA500"/>
                    <circle cx="200" cy="80" r="5" fill="#FFA500"/>
                    <circle cx="300" cy="90" r="5" fill="#FFA500"/>
                    <circle cx="400" cy="60" r="5" fill="#FFA500"/>
                    <circle cx="500" cy="50" r="5" fill="#FFA500"/>
                    <!-- X軸標籤 -->
                    <text x="0" y="175" fill="#888" font-size="10">07/10</text>
                    <text x="100" y="175" fill="#888" font-size="10">07/11</text>
                    <text x="200" y="175" fill="#888" font-size="10">07/12</text>
                    <text x="300" y="175" fill="#888" font-size="10">07/13</text>
                    <text x="400" y="175" fill="#888" font-size="10">07/14</text>
                    <text x="480" y="175" fill="#888" font-size="10">07/15</text>
                </svg>
            </div>
        </div>
        
        <!-- 蛋白質卡片 -->
        <div class="chart-card" style="margin-top: 15px;">
            <div class="chart-header">
                <div>
                    <div class="chart-value">120 <span class="chart-unit">g</span></div>
                    <div class="chart-subtitle">平均每日蛋白質</div>
                </div>
                <div class="chart-emoji">🍗</div>
            </div>
            <div class="chart-container">
                <!-- 這是 Plotly 圖表的示意圖 -->
                <svg width="100%" height="180" viewBox="0 0 500 180">
                    <!-- 漸層填充 -->
                    <defs>
                        <linearGradient id="blueGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" style="stop-color:rgba(56,182,255,0.3)"/>
                            <stop offset="100%" style="stop-color:rgba(56,182,255,0)"/>
                        </linearGradient>
                    </defs>
                    <path d="M0,130 Q50,120 100,100 T200,90 T300,70 T400,80 T500,60 L500,180 L0,180 Z" 
                          fill="url(#blueGradient)"/>
                    <!-- 折線 -->
                    <path d="M0,130 Q50,120 100,100 T200,90 T300,70 T400,80 T500,60" 
                          fill="none" stroke="#38b6ff" stroke-width="3"/>
                    <!-- 資料點 -->
                    <circle cx="0" cy="130" r="5" fill="#38b6ff"/>
                    <circle cx="100" cy="100" r="5" fill="#38b6ff"/>
                    <circle cx="200" cy="90" r="5" fill="#38b6ff"/>
                    <circle cx="300" cy="70" r="5" fill="#38b6ff"/>
                    <circle cx="400" cy="80" r="5" fill="#38b6ff"/>
                    <circle cx="500" cy="60" r="5" fill="#38b6ff"/>
                    <!-- X軸標籤 -->
                    <text x="0" y="175" fill="#888" font-size="10">07/10</text>
                    <text x="100" y="175" fill="#888" font-size="10">07/11</text>
                    <text x="200" y="175" fill="#888" font-size="10">07/12</text>
                    <text x="300" y="175" fill="#888" font-size="10">07/13</text>
                    <text x="400" y="175" fill="#888" font-size="10">07/14</text>
                    <text x="480" y="175" fill="#888" font-size="10">07/15</text>
                </svg>
            </div>
        </div>
        
        <p class="info-text">這是示意圖，實際圖表將由 Plotly 在網頁上渲染</p>
    </div>
</body>
</html>
