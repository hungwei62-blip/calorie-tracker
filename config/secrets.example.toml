# 範例 secrets 檔,複製為 .streamlit\secrets.toml 並填入實際值
# 注意:.streamlit\secrets.toml 必須加入 .gitignore,絕不推上 GitHub

GEMINI_API_KEY = "\u8acb\u586b\u5165\u4f60\u7684 Gemini API Key"

[gcp]
# Google Cloud Service Account JSON \u5168\u6587 (\u5728 Streamlit Cloud \u8a2d\u5b9a\u9801\u4e2d\u8cbc\u5165)
# type = "service_account"
# project_id = "..."
# private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
# client_email = "..."
# client_id = "..."
# auth_uri = "https://accounts.google.com/o/oauth2/auth"
# token_uri = "https://oauth2.googleapis.com/token"
# auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
# client_x509_cert_url = "..."

SPREADSHEET_ID = "\u8acb\u586b\u5165 Google Sheet \u7684 ID (\u5728 URL /d/ \u8207 /edit \u4e4b\u9593)"

[firebase]
# Firebase Storage bucket 名稱
#   新版: <project-id>.firebasestorage.app (Firebase 新預設)
#   舊版: <project-id>.appspot.com
# 二者均可用,firebase_admin SDK 亦接受
STORAGE_BUCKET = "請填入 Firebase Storage bucket"

# 上傳後讀取照片的公開 URL 前綴
#   推薦: https://storage.googleapis.com/<bucket>/   (GCS 短網址)
#   亦可: https://firebasestorage.googleapis.com/v0/b/<bucket>/o/
PUBLIC_URL_PREFIX = "https://storage.googleapis.com/<your-bucket>/"
