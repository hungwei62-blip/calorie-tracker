<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練端底部導航 - Gemini 設計規格預覽</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #F7F7F7;
    min-height: 100vh;
    padding: 60px 20px 200px;
}

/* 模擬頁面內容 */
.page-mock {
    max-width: 800px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.page-mock h1 {
    font-size: 24px;
    color: #1F2937;
    margin-bottom: 16px;
    font-weight: 400;
}
.page-mock p {
    color: #6B7280;
    line-height: 1.7;
    margin-bottom: 12px;
}

/* ============================================ */
/* 底部導航列 — Gemini 設計規格 */
/* ============================================ */

/* 1. 容器 */
.bottom-nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #F3F4F6;
    border: 1px solid #E5E7EB;
    border-radius: 28px;
    padding: 6px 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    z-index: 999;
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 4px;
    width: fit-content;
}

/* 2. 內部按鈕 */
.nav-btn {
    background: #ffffff;
    color: #9CA3AF;
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    padding: 0;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}

/* Hover */
.nav-btn:hover {
    background: #f0f4f1 !important;
    transform: scale(1.05);
}

/* 3. Active 狀態 */
.nav-btn.active {
    background: #FFF78B;
    color: #1F2937;
    box-shadow: 0 2px 8px rgba(255, 247, 139, 0.6);
    transform: scale(1.05);
}

/* 頁面切換示範 */
.page-section {
    display: none;
}
.page-section.active {
    display: block;
}

/* 說明區塊 */
.note {
    background: #fffbeb;
    border-left: 4px solid #FFF78B;
    padding: 16px 20px;
    margin: 20px auto;
    max-width: 800px;
    border-radius: 8px;
    color: #92400e;
    font-size: 14px;
}
</style>
</head>
<body>

<!-- 說明區塊 -->
<div class="note">
    💡 <strong>預覽說明</strong><br>
    這是按照 Gemini 設計規格製作的 HTML 原型，點下方按鈕切換頁面看效果。<br>
    設計重點：48×48 圓形按鈕、淺灰膠囊容器、active 黃色放大、width: fit-content 自適應。
</div>

<!-- 模擬頁面內容 -->
<div class="page-section active" id="statusPage">
    <div class="page-mock">
        <h1>👤 學員狀態</h1>
        <p>這裡會顯示所有學員的膠囊進度條卡片（CAL/PROT/WATER）。</p>
        <p>目前顯示的是學員狀態頁面，底部「👤」按鈕為 active 黃色狀態。</p>
    </div>
</div>

<div class="page-section" id="historyPage">
    <div class="page-mock">
        <h1>📅 學員歷史</h1>
        <p>這裡會顯示每位學員的歷史圖表（體重、飲食、訓練）。</p>
        <p>點下方「📅」按鈕切換到此頁面，「📅」會變成黃色 active。</p>
    </div>
</div>

<!-- 底部導航列（Gemini 規格）-->
<div class="bottom-nav">
    <button class="nav-btn active" onclick="switchPage('status')" aria-label="學員狀態">👤</button>
    <button class="nav-btn" onclick="switchPage('history')" aria-label="學員歷史">📅</button>
</div>

<script>
function switchPage(page) {
    // 移除所有頁面 active
    document.querySelectorAll('.page-section').forEach(function(p) {
        p.classList.remove('active');
    });
    // 移除所有按鈕 active
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    // 顯示目標
    if (page === 'status') {
        document.getElementById('statusPage').classList.add('active');
        document.querySelectorAll('.nav-btn')[0].classList.add('active');
    } else {
        document.getElementById('historyPage').classList.add('active');
        document.querySelectorAll('.nav-btn')[1].classList.add('active');
    }
    window.scrollTo(0, 0);
}
</script>

</body>
</html>
